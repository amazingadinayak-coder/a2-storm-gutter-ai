name: Build and deploy static site to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install gunicorn || true

      - name: Prepare and run Django
        run: |
          python manage.py migrate --noinput || true
          python manage.py collectstatic --noinput || true
          nohup python manage.py runserver 0.0.0.0:8000 >/tmp/django.log 2>&1 &
          # wait for server to start
          for i in {1..10}; do
            if curl -sSf http://127.0.0.1:8000/ >/dev/null; then break; fi
            sleep 1
          done

      - name: Mirror site with wget
        run: |
          mkdir -p public
          wget --adjust-extension --convert-links --page-requisites --no-parent --directory-prefix=public http://127.0.0.1:8000/
          # move mirrored host folder contents up if needed
          if [ -d public/127.0.0.1:8000 ]; then
            shopt -s dotglob || true
            mv public/127.0.0.1:8000/* public/ || true
            rm -rf public/127.0.0.1:8000
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          allow_empty_commit: true
